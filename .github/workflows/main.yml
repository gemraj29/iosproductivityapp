name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Swift
      uses: maxim-t/setup-swift@v2
      with:
        swift-version: '5.9' # Specify your desired Swift version

    - name: Install dependencies
      run: swift package resolve

    - name: Build project
      run: swift build

    - name: Run tests
      run: swift test

